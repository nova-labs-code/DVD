<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DVD Bouncer</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: black;
}

#logo {
  position: fixed;
  width: 140px;
  top: 0;
  left: 0;
  user-select: none;
  will-change: transform;
}
</style>
</head>

<body>

<img id="logo" src="logo.png">

<script>
const logo = document.getElementById("logo");

let x = 120;
let y = 120;
let dx = 3;
let dy = 2;

let dvdMode = false;

// 🎞️ DVD images
const dvdImages = [
  "DVD1.png",
  "DVD2.png",
  "DVD3.png",
  "DVD4.png",
  "DVD5.png"
];

let currentIndex = 0;

// 🎲 always pick a NEW image (never the same twice in a row)
function nextDVD() {
  let newIndex = currentIndex;

  // keep rolling until it's different
  while (newIndex === currentIndex) {
    newIndex = Math.floor(Math.random() * dvdImages.length);
  }

  currentIndex = newIndex;
  logo.src = dvdImages[currentIndex];
}

// 🎮 toggle mode
window.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "e") {
    dvdMode = !dvdMode;

    if (dvdMode) {
      currentIndex = 0;
      logo.src = dvdImages[currentIndex];
    } else {
      logo.src = "logo.png";
    }
  }
});

function loop() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const rect = logo.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  x += dx;
  y += dy;

  let hit = false;

  // wall bounce logic 🧱
  if (x + w >= vw) {
    x = vw - w;
    dx = -Math.abs(dx);
    hit = true;
  }

  if (x <= 0) {
    x = 0;
    dx = Math.abs(dx);
    hit = true;
  }

  if (y + h >= vh) {
    y = vh - h;
    dy = -Math.abs(dy);
    hit = true;
  }

  if (y <= 0) {
    y = 0;
    dy = Math.abs(dy);
    hit = true;
  }

  // 🎯 guaranteed change every bounce
  if (dvdMode && hit) {
    nextDVD();
  }

  logo.style.transform = `translate(${x}px, ${y}px)`;

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
